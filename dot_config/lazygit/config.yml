# Minimal lazygit config - focused on conflicts & diffs

gui:
  showFileTree: false          # Flat file list (faster)
  showRandomTip: false         # No tips
  showCommandLog: false        # Hide command log
  showBottomLine: true         # Show keybindings
  nerdFontsVersion: "3"        # Nerd font icons
  theme:
    # Kanagawa Dragon
    activeBorderColor:
      - "#8ba4b0"              # Dragon blue
      - bold
    inactiveBorderColor:
      - "#625e5a"              # Dragon ash
    optionsTextColor:
      - "#8ba4b0"              # Dragon blue
    selectedLineBgColor:
      - "#282727"              # Dragon bg highlight
    cherryPickedCommitBgColor:
      - "#282727"
    cherryPickedCommitFgColor:
      - "#a292a3"              # Dragon pink
    unstagedChangesColor:
      - "#c4746e"              # Dragon red
    defaultFgColor:
      - "#c5c9c5"              # Dragon white
    searchingActiveBorderColor:
      - "#c4b28a"              # Dragon yellow

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never --line-numbers

  merging:
    manualCommit: false        # Auto-commit after merge
    args: ""

  log:
    showGraph: when-maximised  # Show graph only when panel maximised
    showWholeGraph: false

os:
  editPreset: "nvim"           # Use nvim for editing

keybinding:
  universal:
    quit: "q"
    quit-alt1: "<c-c>"
    return: "<esc>"
    prevItem: "k"
    nextItem: "j"
    prevBlock: "h"
    nextBlock: "l"
    scrollUpMain: "<c-u>"
    scrollDownMain: "<c-d>"

confirmOnQuit: false
quitOnTopLevelReturn: true     # q quits from top level
